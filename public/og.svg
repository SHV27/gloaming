  <text x="600" y="392" text-anchor="middle" font-family="Cinzel, Georgia, serif" font-size="118" font-weight="700" letter-spacing="14" fill="#EDE6D6">GLOAM<tspan fill="#FFD27A">ING</tspan></text>
  <text x="600" y="452" text-anchor="middle" font-family="'Space Mono', monospace" font-size="26" letter-spacing="10" fill="#8C8398">A  LIVING  BOARD  GAME</text>
  <text x="600" y="528" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="30" font-style="italic" fill="#B9A7D6">The dark is eating the map. Light the Wards, reach the Heart —</text>
  <text x="600" y="568" text-anchor="middle" font-family="Spectral, Georgia, serif" font-size="30" font-style="italic" fill="#B9A7D6">and pray it doesn't already know your name.</text>
